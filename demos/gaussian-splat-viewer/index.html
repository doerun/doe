<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Doe Gaussian Splat Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080a10; color: #ccc; font: 13px/1.5 monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #controls { padding: 8px 12px; display: flex; gap: 12px; align-items: center; width: 100%; background: #0b0d13; border-bottom: 1px solid #1a1c22; }
  label { display: flex; align-items: center; gap: 6px; }
  input[type="text"] { background: #1a1c22; color: #ccc; border: 1px solid #333; padding: 3px 8px; border-radius: 3px; min-width: 320px; font: inherit; }
  input[type="file"] { color: #ccc; font: inherit; }
  button { background: #1a1c22; color: #ccc; border: 1px solid #333; padding: 3px 10px; border-radius: 3px; cursor: pointer; font: inherit; }
  button:hover { background: #232530; }
  button:disabled { color: #444; cursor: not-allowed; }
  #status { margin-left: auto; font-size: 11px; color: #666; }
  #stage { flex: 1; position: relative; overflow: hidden; }
  canvas { width: 100%; height: 100%; display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }
  #video {
    position: absolute;
    right: 16px;
    bottom: 16px;
    width: 240px;
    height: 180px;
    background: #000;
    border: 1px solid #333;
    border-radius: 4px;
    object-fit: cover;
    display: none;
  }
  #video.on { display: block; }
  #hud {
    position: absolute;
    left: 16px;
    top: 16px;
    background: rgba(0, 0, 0, 0.55);
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.6;
    pointer-events: none;
    user-select: none;
    color: #bbb;
  }
  #hud .k { color: #888; }
  .sep { width: 1px; background: #1a1c22; height: 16px; }
</style>
</head>
<body>
<div id="controls">
  <label>scene
    <input type="file" id="file" accept=".splat,.ply">
  </label>
  <div class="sep"></div>
  <label>url
    <input type="text" id="url" placeholder="https://.../scene.splat">
    <button id="load-url">load</button>
  </label>
  <div class="sep"></div>
  <button id="video-toggle">webcam overlay: off</button>
  <span id="status">drop a .splat file or paste a URL</span>
</div>
<div id="stage">
  <canvas id="c"></canvas>
  <video id="video" autoplay playsinline muted></video>
  <div id="hud">
    <div><span class="k">drag</span> orbit &middot; <span class="k">shift+drag</span> pan &middot; <span class="k">wheel</span> dolly</div>
    <div><span class="k">splats:</span> <span id="hud-count">0</span> &middot; <span class="k">fps:</span> <span id="hud-fps">—</span> &middot; <span class="k">sort:</span> <span id="hud-sort">—</span></div>
  </div>
</div>
<script type="module" src="./main.js"></script>
</body>
</html>
