<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Doe Canvas Stress</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080a10; color: #ccc; font: 13px/1.5 monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #controls { padding: 8px 12px; display: flex; gap: 12px; align-items: center; background: #0b0d13; border-bottom: 1px solid #1a1c22; }
  label { display: flex; align-items: center; gap: 6px; }
  input[type=range] { width: 160px; }
  #status { margin-left: auto; font-size: 11px; color: #666; }
  #stage { flex: 1; position: relative; overflow: hidden; }
  canvas { width: 100%; height: 100%; display: block; }
  #hud { position: absolute; left: 12px; top: 12px; background: rgba(0,0,0,0.55); padding: 6px 10px; border-radius: 4px; font-size: 11px; color: #bbb; pointer-events: none; }
  #hud .k { color: #888; }
</style>
</head>
<body>
<div id="controls">
  <label>count
    <input type="range" id="count" min="500" max="40000" step="500" value="10000">
    <span id="count-val">10000</span>
  </label>
  <label>size
    <input type="range" id="size" min="0.005" max="0.08" step="0.005" value="0.04">
  </label>
  <span id="status">initializing…</span>
</div>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="hud"><span class="k">fps:</span> <span id="fps">—</span></div>
</div>
<script type="module" src="./main.js"></script>
</body>
</html>
