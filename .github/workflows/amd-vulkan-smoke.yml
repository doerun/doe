name: amd-vulkan-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"

jobs:
  smoke:
    runs-on:
      - self-hosted
      - linux
      - amd-vulkan
    env:
      CONFIG_PATH: bench/compare_dawn_vs_doe.config.amd.vulkan.smoke.gpu.json
      REPORT_PATH: bench/out/dawn-vs-doe.amd.vulkan.smoke.gpu.16mb.json
      WORKSPACE_PATH: bench/out/runtime-comparisons.amd.vulkan.smoke.gpu.16mb
    steps:
      - uses: actions/checkout@v4
      - name: Run canonical smoke pipeline
        run: |
          python3 bench/run_release_pipeline.py --config "$CONFIG_PATH" --report "$REPORT_PATH" --strict-amd-vulkan --verify-smoke-report "$REPORT_PATH" --verify-smoke-require-comparable
      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amd-vulkan-smoke-report
          path: |
            ${{ env.REPORT_PATH }}
            bench/out/**/dawn-vs-doe.amd.vulkan.smoke.gpu.16mb*.json
            bench/out/**/dawn-vs-doe.amd.vulkan.smoke.gpu.16mb*.html
            ${{ env.WORKSPACE_PATH }}
            bench/out/**/runtime-comparisons.amd.vulkan.smoke.gpu.16mb*
            bench/out/**/run_manifest.json
