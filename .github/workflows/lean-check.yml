name: fawn-lean-check

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lean-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Run Lean typecheck
        run: bash pipeline/lean/check.sh
      - name: Extract proof artifacts
        run: bash pipeline/lean/extract.sh
      - name: Validate proof artifact
        run: python3 pipeline/lean/test_proof_pipeline.py
      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: proven-conditions
          path: pipeline/lean/artifacts/proven-conditions.json
