name: doe-gpu native freshness

# Enforces the publish-time contract that platform packages
# (doe-gpu-linux-x64, doe-gpu-darwin-arm64) cannot ship a libwebgpu_doe.so
# that predates the current WGSL compiler source tree. Runs on every PR
# touching either the Zig WGSL compiler source or the staging scripts,
# so the freshness guard cannot regress silently.

on:
  pull_request:
    paths:
      - ".github/workflows/doe-gpu-native-freshness.yml"
      - "runtime/zig/build.zig"
      - "runtime/zig/src/doe_wgsl/**"
      - "runtime/zig/src/doe_shader_translation_cache.zig"
      - "runtime/zig/src/pipeline_cache.zig"
      - "packages/doe-gpu/scripts/**"
      - "packages/doe-gpu/test/unit/stage-platform-freshness.test.js"
      - "packages/doe-gpu-linux-x64/package.json"
      - "packages/doe-gpu-darwin-arm64/package.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/doe-gpu-native-freshness.yml"
      - "runtime/zig/build.zig"
      - "runtime/zig/src/doe_wgsl/**"
      - "runtime/zig/src/doe_shader_translation_cache.zig"
      - "runtime/zig/src/pipeline_cache.zig"
      - "packages/doe-gpu/scripts/**"
      - "packages/doe-gpu/test/unit/stage-platform-freshness.test.js"
      - "packages/doe-gpu-linux-x64/package.json"
      - "packages/doe-gpu-darwin-arm64/package.json"

jobs:
  freshness-guard-unit:
    # Pure-JS unit test of the source-tree hasher mirror. Runs on a
    # plain runner because it does not need the Zig toolchain.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run freshness guard unit test
        run: node --test packages/doe-gpu/test/unit/stage-platform-freshness.test.js

  rebuild-then-stage:
    # End-to-end: build the drop-in .so from source, stage the platform
    # package, and verify the freshness guard accepts the fresh artifact.
    # Then simulate staleness by rewriting the metadata hash and assert
    # the guard rejects it with the typed error.
    runs-on:
      - self-hosted
      - linux
      - amd-vulkan
    steps:
      - uses: actions/checkout@v4

      - name: zig build dropin
        working-directory: runtime/zig
        run: zig build dropin -Doptimize=ReleaseFast

      - name: Stage linux-x64 package (must succeed against fresh build)
        working-directory: packages/doe-gpu-linux-x64
        run: npm run stage

      - name: Inject stale hash and confirm stage refuses
        run: |
          python3 - <<'PY'
          import json, pathlib
          path = pathlib.Path('runtime/zig/zig-out/share/doe-build-metadata.json')
          doc = json.loads(path.read_text())
          doc['wgslCompilerSourceSha256'] = 'c0ffee' * 10 + 'abcd'
          path.write_text(json.dumps(doc, indent=2))
          PY
          set +e
          (cd packages/doe-gpu-linux-x64 && node ../doe-gpu/scripts/stage-platform-package.js) > /tmp/stage-stale.log 2>&1
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "FAIL: stage returned 0 with a stale metadata hash; freshness guard regressed."
            cat /tmp/stage-stale.log
            exit 1
          fi
          grep -q 'predates the current' /tmp/stage-stale.log || {
            echo "FAIL: stage exited nonzero but did not emit the typed 'predates the current' message."
            cat /tmp/stage-stale.log
            exit 1
          }
          echo "ok: stage refused stale metadata with the typed error."

      - name: Rebuild and re-stage to leave the workspace clean
        run: |
          cd runtime/zig && zig build dropin -Doptimize=ReleaseFast
          cd ../../packages/doe-gpu-linux-x64 && npm run stage
