name: macos-browser-refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "15 9 * * *"

jobs:
  browser-refresh:
    runs-on:
      - self-hosted
      - macOS
    steps:
      - uses: actions/checkout@v4
      - name: Build local Doe/browser prerequisites
        run: |
          cd zig
          zig build dropin
          zig build module-core-runner
          zig build test
      - name: Run promoted blocking gates
        run: |
          STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          python3 bench/run_blocking_gates.py \
            --report "bench/out/scratch/${STAMP}/macos-browser-refresh.json" \
            --trace-semantic-parity-mode auto \
            --with-browser-gate \
            --with-modules
      - name: Run local browser claim lane
        run: |
          python3 bench/browser_claim_gate.py \
            --policy config/browser-claim-policy.json
      - name: Prune retained artifacts
        run: |
          python3 bench/cleanup_out.py --retention-days 14
          python3 nursery/fawn-browser/scripts/cleanup-browser-artifacts.py --retention-days 14
      - name: Upload browser refresh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-browser-refresh
          retention-days: 14
          path: |
            bench/out/browser-promotion/**
            bench/out/browser-claim/**
            bench/out/scratch/**
            nursery/fawn-browser/artifacts/**
