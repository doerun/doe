name: fawn-release-gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  release-report-gates:
    runs-on:
      - self-hosted
      - linux
      - amd-vulkan
    env:
      CONFIG_PATH: bench/compare_dawn_vs_fawn.config.amd.vulkan.release.json
    steps:
      - uses: actions/checkout@v4
      - name: Run canonical release pipeline
        run: |
          python3 bench/run_release_pipeline.py --config "$CONFIG_PATH" --strict-amd-vulkan --with-claim-gate
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fawn-release-gates-report
          path: |
            bench/out/dawn-vs-fawn.amd.vulkan.release*.json
            bench/out/runtime-comparisons.amd.vulkan.release*
