name: fawn-release-gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  release-report-gates:
    runs-on:
      - self-hosted
      - linux
      - amd-vulkan
    env:
      CONFIG_PATH: bench/compare_dawn_vs_fawn.config.amd.vulkan.release.json
      DROPIN_ARTIFACT: zig/zig-out/lib/libdoe_webgpu.so
    steps:
      - uses: actions/checkout@v4
      - name: Build Fawn drop-in artifact
        run: |
          cd zig
          zig build dropin -Doptimize=ReleaseFast
          test -f zig-out/lib/libdoe_webgpu.so
      - name: Run canonical release pipeline
        run: |
          python3 bench/run_release_pipeline.py --config "$CONFIG_PATH" --strict-amd-vulkan --trace-semantic-parity-mode auto --with-dropin-gate --dropin-artifact "$DROPIN_ARTIFACT" --with-claim-gate
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fawn-release-gates-report
          path: |
            bench/out/dawn-vs-fawn.amd.vulkan.release*.json
            bench/out/**/dawn-vs-fawn.amd.vulkan.release*.json
            bench/out/dawn-vs-fawn.amd.vulkan.release*.html
            bench/out/**/dawn-vs-fawn.amd.vulkan.release*.html
            bench/out/runtime-comparisons.amd.vulkan.release*
            bench/out/**/runtime-comparisons.amd.vulkan.release*
            bench/out/**/run_manifest.json
            bench/out/dropin_*.json
            bench/out/**/dropin_*.json
            bench/out/dropin_*.html
            bench/out/**/dropin_*.html
