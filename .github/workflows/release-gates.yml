name: fawn-release-gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  trace-gate:
    runs-on: ubuntu-latest
    env:
      REPORT_PATH: bench/out/dawn-vs-fawn.json
    steps:
      - uses: actions/checkout@v4
      - name: Run release report gates
        run: |
          if [ ! -f "$REPORT_PATH" ]; then
            echo "FAIL: missing $REPORT_PATH"
            exit 1
          fi
          python3 bench/run_blocking_gates.py --report "$REPORT_PATH" --with-claim-gate --claim-require-claimability-mode release --claim-require-claim-status claimable --claim-require-comparison-status comparable --claim-require-min-timed-samples 15
