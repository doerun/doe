name: WebGPU package surface

on:
  pull_request:
    paths:
      - ".github/workflows/webgpu-package-surface.yml"
      - "nursery/webgpu/**"
  push:
    paths:
      - ".github/workflows/webgpu-package-surface.yml"
      - "nursery/webgpu/**"

jobs:
  package-surface:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nursery/webgpu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Node package export tests
        run: node ./test-package-exports.js

      - uses: oven-sh/setup-bun@v2

      - name: Run Bun package tests
        run: bun ./test-bun.js
